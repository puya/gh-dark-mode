# Quick compile check on every push / PR (NuGet Grasshopper SDK on Ubuntu).

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "7.0.x"
      - run: dotnet build src/GHDarkMode/GHDarkMode.csproj -c Release
