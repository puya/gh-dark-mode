# Yak package manifest for Rhino Package Manager.
# Version: use $version so `yak build` infers semver from the built GHA (same as Directory.Build.props <Version>).
# After `./scripts/build.sh`, dist/ contains this file, GHDarkMode.gha, and the icon below for `yak build`.
---
name: gh-dark-mode
version: $version
authors:
  - Puya Khalili
description: >
  Dark mode for Grasshopper in Rhino 8, on Mac and Windows. Applies a polished dark look by default,
  and you can switch back to your normal theme anytime. Optional components let you customize colors
  when you want the UI exactly your way. Home page (source and releases):
  https://github.com/puya/gh-dark-mode
url: "https://github.com/puya/gh-dark-mode"
icon: gh-darkmode-main-a.png
keywords:
  - grasshopper
  - dark-mode
  - theme
  - gui
  - skin
  - rhino-8
  - windows
  - mac
